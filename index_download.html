<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐎 2026 NMJL Hand Tracker 🐎</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--line:#d8dce7;--text:#111827;--muted:#5b6476;--blue:#243b73;--green:#179348;--red:#cf3344;--purple:#6d28d9;--gold:#b7791f;--shadow:0 10px 24px rgba(17,24,39,.08)}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.topbar{position:sticky;top:0;z-index:1000;background:rgba(245,246,250,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);box-shadow:0 2px 12px rgba(17,24,39,.05)}

.topbar-title{
  text-align:center;
  font-weight:800;
  font-size:1.18rem;
  letter-spacing:.01em;
  color:var(--blue);
  padding:10px 12px 4px;
}
.topbar-search{
  padding:0 12px 8px;
}
.topbar-search input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  font-size:14px;
  background:#fff;
}
.topbar-buttons{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:0 12px 10px;
}

.topbar-inner{max-width:920px;margin:0 auto;padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.title{font-weight:800;font-size:1.1rem;letter-spacing:.01em;color:var(--blue)} .reset{color:white;border:none;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.reset:last-child{
  background:#dc2626;
}
.reset:active{
  transform:scale(0.96);
}
.page{max-width:920px;margin:0 auto;padding:12px 12px 28px}
.helper{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;color:var(--muted);font-size:12px;line-height:1.35;margin-bottom:12px;white-space:normal;overflow-wrap:anywhere;word-break:break-word;box-shadow:var(--shadow)}
.credit{display:block;color:var(--purple);margin-top:2px}
.section{margin:14px 0 18px} .section-title{position:sticky;top:48px;z-index:900;background:linear-gradient(180deg,rgba(245,246,250,.98),rgba(245,246,250,.92));padding:8px 2px 6px;margin:0 0 8px;font-size:1.15rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:var(--blue)}
.row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 12px 11px;margin-bottom:10px;box-shadow:var(--shadow)}
.row.checked{background:#e7e7eb} .row.selected{background:#fff7bf;border-color:#e6d36a;box-shadow:0 10px 24px rgba(230,211,106,.28)} .row.selected.checked{background:#f3e58b} .box{width:24px;height:24px;margin-top:2px;accent-color:var(--blue)} .main{min-width:0}
.hand{font-size:1.24rem;line-height:1.22;font-weight:800;letter-spacing:.01em;overflow-wrap:anywhere;word-break:break-word} .exp{margin-top:6px;font-size:.98rem;line-height:1.3;color:var(--muted)} .val{min-width:54px;text-align:right;font-size:1.22rem;line-height:1.2;font-weight:900;color:var(--red);white-space:nowrap;padding-top:2px} .val.c{color:var(--gold)}
.green{color:var(--green)} .red{color:var(--red)} .blue{color:var(--blue)} .dark{color:#1f2937} .or{color:#8a90a0;font-weight:700;font-size:.88em;white-space:nowrap}
.row.checked .hand,.row.checked .exp,.row.checked .val{opacity:.72;text-decoration:none}
.fireworks-overlay{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:3000} .firework-particle{position:absolute;width:8px;height:8px;border-radius:999px;opacity:0;animation:firework-burst 1400ms ease-out forwards}
.celebrate-banner{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:3001;background:rgba(255,255,255,.96);border:2px solid #e5e7eb;border-radius:16px;padding:12px 18px;font-size:22px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,.12);opacity:0;animation:banner-pop 1800ms ease-in-out forwards}
@keyframes firework-burst{0%{transform:translate(0,0) scale(.2);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1);opacity:0}} @keyframes banner-pop{0%{opacity:0;transform:translateX(-50%) scale(.85)}12%{opacity:1;transform:translateX(-50%) scale(1)}88%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(.95)}}
@media (max-width:640px){

}
.topbar-search{
  padding:0 12px 8px;
}
.topbar-search input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  font-size:14px;
  background:#fff;
}
.topbar-buttons{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:0 12px 10px;
}

.topbar-inner{padding:9px 10px 7px} .title{font-size:1rem} .page{padding:10px 8px 24px} .section-title{top:45px;font-size:1.05rem} .row{gap:10px;padding:11px 10px} .box{width:26px;height:26px} .hand{font-size:1.12rem} .exp{font-size:.92rem} .val{font-size:1.08rem;min-width:48px}}
</style></head>

g Dragon", "val": "X 25"}, {"hand": "<span class=\"green\">11 33</span> <span class=\"red\">111 333</span> <span class=\"blue\">5555</span> <span class=\"or\">—or—</span> <span class=\"green\">55 77</span> <span class=\"red\">555 777</span> <span class=\"blue\">9999</span>", "exp": "Any 3 Suits", "val": "X 25"}, {"hand": "<span class=\"blue\">1111 33 55 77 9999</span> <span class=\"or\">—or—</span> <span class=\"green\">1111</span> <span class=\"red\">33 55 77</span> <span class=\"green\">9999</span>", "exp": "Any 1 or 2 Suits", "val": "X 30"}, {"hand": "<span class=\"blue\">FF</span> <span class=\"green\">11 33 55</span> <span class=\"red\">111 111</span> <span class=\"or\">—or—</span> <span class=\"blue\">FF</span> <span class=\"green\">55 77 99</span> <span class=\"red\">555 555</span>", "exp": "Any 3 Suits, These Nos. Only", "val": "C 35"}, {"hand": "<span class=\"green\">FF 135 777 999</span> <span class=\"red\">DDD</span>", "exp": "Any 1 Suit w Opp. Dragon", "val": "C 30"}]}, {"title": "Winds - Dragons", "rows": [{"hand": "<span class=\"dark\">NNNN EEE WWW SSSS</span> <span class=\"or\">—or—</span> <span class=\"dark\">NNN EEEE WWWW SSS</span>", "exp": "", "val": "X 25"}, {"hand": "<span class=\"blue\">1234</span> <span class=\"green\">DDD</span> <span class=\"red\">DDD</span> <span class=\"blue\">DDDD</span>", "exp": "Any 4 Consec. Nos. in Any 1 Suit, Any 3 Dragons", "val": "X 25"}, {"hand": "<span class=\"dark\">NNN</span> <span class=\"green\">1111</span> <span class=\"red\">1111</span> <span class=\"dark\">SSS</span>", "exp": "Any Like Odd Nos. in Any 2 Suits", "val": "X 25"}, {"hand": "<span class=\"dark\">EEE</span> <span class=\"green\">2222</span> <span class=\"red\">2222</span> <span class=\"dark\">WWWW</span>", "exp": "Any Like Even Nos. in Any 2 Suits", "val": "X 25"}, {"hand": "<span class=\"blue\">FFF</span> <span class=\"dark\">NNNN</span> <span class=\"blue\">FFF</span> <span class=\"dark\">DDDD</span>", "exp": "Any Wind, Any Dragon", "val": "X let undoStack = [];

function saveState() {
  const state = {};
  document.querySelectorAll(".box").forEach((b, i) => state[i] = b.checked);
  undoStack.push(state);
}

function undoLast() {
  if (undoStack.length === 0) return;
  const prev = undoStack.pop();
  document.querySelectorAll(".box").forEach((b, i) => {
    b.checked = prev[i] || false;
    b.closest(".row").classList.toggle("checked", b.checked);
  });
}

const app=document.getElementById("app"),fireworksOverlay=document.getElementById("fireworksOverlay"); let celebrationPlayed=false;
const valueClass=v=>v.trim().startsWith("C")?"val c":"val"; const rowKey=(s,i)=>`nmjl2026::${s}::${i}`;
function render(){app.innerHTML=""; sections.forEach(section=>{const sec=document.createElement("section"); sec.className="section"; const h=document.createElement("h2"); h.className="section-title"; h.textContent=section.title; sec.appendChild(h);
section.rows.forEach((row,idx)=>{const item=document.createElement("label"); item.className="row"; const box=document.createElement("input"); box.type="checkbox"; box.className="box"; const key=rowKey(section.title,idx); item.dataset.key = key; box.checked=localStorage.getItem(key)==="true"; if(box.checked)item.classList.add("checked"); if(localStorage.getItem(key+"::selected")==="true") item.classList.add("selected");
box.addEventListener("change",()=>{ saveState();localStorage.setItem(key,box.checked); item.classList.toggle("checked",box.checked); checkForCompletion();});
item.addEventListener("click",(e)=>{
  if (e.target.closest(".box")) return;
  saveState();
  item.classList.toggle("selected");
  localStorage.setItem(key + "::selected", item.classList.contains("selected") ? "true" : "false");
});
const main=document.createElement("div"); main.className="main"; const hand=document.createElement("div"); hand.className="hand"; hand.innerHTML=row.hand; const exp=document.createElement("div"); exp.className="exp"; exp.textContent=row.exp||" "; const val=document.createElement("div"); val.className=valueClass(row.val); val.textContent=row.val; main.appendChild(hand); main.appendChild(exp); item.appendChild(box); item.appendChild(main); item.appendChild(val); sec.appendChild(item);}); app.appendChild(sec);}); checkForCompletion();}
function celebrateComplete(){fireworksOverlay.innerHTML=""; const banner=document.createElement("div"); banner.className="celebrate-banner"; banner.textContent="🎉 Card Complete! 🎉"; fireworksOverlay.appendChild(banner);
const colors=["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899"]; for(let burst=0;burst<10;burst++){const x=8+Math.random()*84,y=10+Math.random()*60; for(let i=0;i<18;i++){const p=document.createElement("div"); p.className="firework-particle"; const angle=(Math.PI*2*i)/18,distance=30+Math.random()*70; p.style.left=x+"vw"; p.style.top=y+"vh"; p.style.background=colors[(i+burst)%colors.length]; p.style.setProperty("--dx",(Math.cos(angle)*distance)+"px"); p.style.setProperty("--dy",(Math.sin(angle)*distance)+"px"); fireworksOverlay.appendChild(p);}} setTimeout(()=>fireworksOverlay.innerHTML="",2200);}
function checkForCompletion(){const boxes=Array.from(document.querySelectorAll(".box")); if(!boxes.length)return; const allDone=boxes.every(b=>b.checked); if(allDone&&!celebrationPlayed){celebrationPlayed=true; celebrateComplete();} else if(!allDone) celebrationPlayed=false;}

function filterRows(){
  const q = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll(".row").forEach(row=>{
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(q) ? "" : "none";
  });
}

function resetAll(){if(!confirm("Clear all progress?"))return; Object.keys(localStorage).forEach(k=>{if(k.startsWith("nmjl2026::"))localStorage.removeItem(k);}); if (!localStorage.getItem("nmjl2026_initialized")) {
  Object.keys(localStorage).forEach(k => { if (k.startsWith("nmjl2026::")) localStorage.removeItem(k); });
  localStorage.setItem("nmjl2026_initialized", "true");
}
render();}
render();
